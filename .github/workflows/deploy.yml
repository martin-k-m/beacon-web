name: Deploy to GitHub Pages

# Beacon (beacon.blinkdev.me) — static Next.js export deployed to GitHub Pages
# via GitHub Actions (Pages "Source" must be set to "GitHub Actions", NOT
# "Deploy from a branch"). The site is served from the custom-domain ROOT, so
# the build uses no base path.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token scoped for Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        # enablement: true turns on Pages (source = GitHub Actions) on the first
        # run if it hasn't been enabled in the repo settings yet.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        # No NEXT_PUBLIC_BASE_PATH: the custom domain serves from root.

      - name: Verify custom domain (CNAME) survived the build
        run: |
          test -f out/CNAME || { echo "::error::out/CNAME missing — custom domain would break"; exit 1; }
          echo "CNAME -> $(cat out/CNAME)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
